<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Vibe Player</title>
        <link rel="stylesheet" href="styles/styles.css">
    </head>
    <body>
        <div class="player"> <!-- main buttons -->
            <button style="margin-right: 10px;", id="previous-btn">❮❮</button>
            <button style="margin-right: 10px;", id="play-btn">►</button>
            <button id="next-btn">❯❯</button>
        </div>
        <div class="playlist"> <!-- now playing song and songs list -->
            <div class="playlist-button">
                <button id="nowPlaying-btn"><span class="scrolling-text">Now playing...</span></button> <!-- header for playlist -->
                <div class="playlist-list"> <!-- list of songs -->
                    <p>Song 1</p>
                    <p>Song 2 (WOO-HOO)</p>
                    <p>Song 3</p>
                </div>
            </div>
        </div>
        <div class="changeButton">
                <button id="repeat-btn">↺</button>
                <button id="spedUp-btn">⏭</button>
                <button id="slowDown-btn">⏮</button>
                <button id="delete-btn">🗑️</button>
            </div>
        <div class="addSong"> <!-- add song -->
            <button id="addSong-btn">Add song</button>
        </div>
        <script src="../renderer.js"></script> 
    </body>
</html>
