<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Vibe Player</title>
        <link rel="stylesheet" href="styles/styles.css">
    </head>
    <body>
        <div class="player">
            <button style="margin-right: 10px;", id="previous-btn">❮❮</button>
            <button style="margin-right: 10px;", id="play-btn">►</button>
            <button id="next-btn">❯❯</button>

            <button id="nowPlaying-btn"><span class="scrolling-text">Now playing...</span></button>
            <div id="playlist-panel" class="playlist-panel">
                <div class="playlist-header">Playlist</div>
                <ul class="playlist-list">
                    <li>Song 1</li>
                    <li>Song 2 (WOO-HOO)</li>
                    <li>Song 3</li>
                </ul>
            </div>
        </div>
        <script src="../renderer.js"></script>
    </body>
</html>
